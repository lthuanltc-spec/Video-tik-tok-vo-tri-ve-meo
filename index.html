<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>
</head>

<body style="margin:0;background:black;overflow:hidden;">

<video id="v" loop playsinline
style="position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;">
<source src="9cbe6e7edf8cd5bd2f87fbd0b552e2ec.mp4" type="video/mp4">
</video>

<script>

let v = document.getElementById("v");

// khi chạm màn hình
document.body.addEventListener("click", function(){

  v.muted = false;
  v.volume = 1;

  v.play();

  // luôn ép âm lượng max
  setInterval(()=>{
    v.volume = 1;
  },100);

});

// nếu pause thì phát lại
v.addEventListener("pause", ()=>{
  v.play();
});

</script>

</body>
</html>
